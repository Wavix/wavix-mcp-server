name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type-check
        run: mypy src
      - name: Tests
        run: pytest

  tools-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e .
      - name: Regenerate TOOLS.md and README, fail on drift
        run: |
          python scripts/generate_tools_md.py
          if ! git diff --quiet TOOLS.md README.md; then
            echo "::error::TOOLS.md or README.md is out of date. Run 'python scripts/generate_tools_md.py' and commit."
            git --no-pager diff TOOLS.md README.md
            exit 1
          fi
          echo "TOOLS.md and README.md are in sync with the Wavix OpenAPI spec."

  validate-server-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install jsonschema
      - name: Validate server.json against MCP Registry schema
        run: |
          python - <<'PY'
          import json, sys, urllib.request
          from jsonschema import Draft7Validator, RefResolver

          with open("server.json") as f:
              doc = json.load(f)
          with urllib.request.urlopen(doc["$schema"]) as r:
              schema = json.load(r)

          resolver = RefResolver.from_schema(schema)
          errors = list(Draft7Validator(schema, resolver=resolver).iter_errors(doc))
          if errors:
              for e in errors:
                  path = ".".join(str(p) for p in e.absolute_path) or "<root>"
                  print(f"[{path}] {e.message}")
              sys.exit(1)
          print("server.json valid")
          PY
